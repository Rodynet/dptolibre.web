<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DptoLibre - Onboarding Inmobiliario V2.1</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0A142F;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo de Botón de Selección con Entidad */
        .btn-method-select {
            @apply flex flex-col items-center justify-center p-8 border-2 border-slate-100 rounded-[2.5rem] bg-white transition-all cursor-pointer ring-offset-4 ring-transparent;
        }
        .btn-method-select:hover {
            @apply border-[#0055DD] shadow-2xl shadow-blue-100 -translate-y-1;
        }
        .btn-method-select.active {
            @apply border-[#0055DD] bg-blue-50 ring-2 ring-[#0055DD];
        }

        .input-pill {
            @apply w-full bg-slate-50 border-2 border-transparent px-6 py-4 rounded-2xl text-sm font-bold focus:ring-0 focus:border-[#0055DD] focus:bg-white outline-none transition-all;
        }

        .chip-select {
            @apply px-5 py-2.5 rounded-full border-2 border-slate-100 text-[11px] font-extrabold uppercase tracking-widest cursor-pointer transition-all bg-white text-slate-400;
        }
        .chip-select.active {
            @apply border-[#0055DD] bg-blue-50 text-[#0055DD] shadow-sm;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function DptoLibreOnboarding() {
            // ESTADOS: welcome, method_select, property_form, bulk_upload, link_import, qr_scan, dashboard
            const [step, setStep] = useState('welcome');
            const [propertyData, setPropertyData] = useState({
                type: 'Departamento',
                rooms: 1,
                bathrooms: 1,
                garage: 'No',
                outdoor: 'Ninguno',
                amenities: []
            });

            // --- VISTA 1: BIENVENIDA ---
            const WelcomeView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                    <div className="max-w-xl w-full text-center">
                        <div className="w-24 h-24 bg-blue-50 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 text-[#0055DD] shadow-inner">
                            <Icon name="building-2" size={48} />
                        </div>
                        <h1 className="text-4xl font-black text-slate-900 tracking-tight leading-none mb-4 italic">¡Hola Rodrigo!<br/>Empecemos tu cartera</h1>
                        <p className="text-slate-400 font-medium mb-12 px-10 leading-relaxed text-lg italic">
                            Sube tu primera propiedad para activar el blindaje. Todo el proceso te tomará menos de 3 minutos.
                        </p>
                        <button onClick={() => setStep('method_select')} className="bg-[#0055DD] text-white px-12 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-blue-200 active:scale-95 transition-all">
                            Cargar Mi Primer Activo
                        </button>
                    </div>
                </div>
            );

            // --- VISTA 2: SELECCIÓN DE MÉTODO (CON MÁS ENTIDAD) ---
            const MethodSelectView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                    <div className="max-w-5xl w-full">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter">¿Cómo quieres cargar tus datos?</h2>
                            <p className="text-slate-400 font-medium mt-3">Selecciona una opción para continuar.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                            <div onClick={() => setStep('property_form')} className="btn-method-select">
                                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 text-[#0055DD]"><Icon name="plus-circle" size={32} /></div>
                                <span className="text-xs font-black uppercase tracking-widest text-slate-800">Uno por Uno</span>
                                <p className="text-[9px] mt-2 uppercase font-bold opacity-40">Carga Manual</p>
                            </div>
                            <div onClick={() => setStep('bulk_upload')} className="btn-method-select">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 text-slate-400"><Icon name="file-spreadsheet" size={32} /></div>
                                <span className="text-xs font-black uppercase tracking-widest text-slate-800">Carga Masiva</span>
                                <p className="text-[9px] mt-2 uppercase font-bold opacity-40">Excel / CRM</p>
                            </div>
                            <div onClick={() => setStep('link_import')} className="btn-method-select">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 text-slate-400"><Icon name="link" size={32} /></div>
                                <span className="text-xs font-black uppercase tracking-widest text-slate-800">Importar Link</span>
                                <p className="text-[9px] mt-2 uppercase font-bold opacity-40">Portales</p>
                            </div>
                            <div onClick={() => setStep('qr_scan')} className="btn-method-select">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 text-slate-400"><Icon name="qr-code" size={32} /></div>
                                <span className="text-xs font-black uppercase tracking-widest text-slate-800">Carga por QR</span>
                                <p className="text-[9px] mt-2 uppercase font-bold opacity-40">Archivo / PC</p>
                            </div>
                        </div>
                        <div className="mt-16 text-center">
                            <button onClick={() => setStep('welcome')} className="text-slate-400 font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 mx-auto hover:text-slate-900 transition-colors">
                                <Icon name="arrow-left" size={14} /> Volver atrás
                            </button>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA 3: CARGA QR (REDISEÑADA PARA WEB) ---
            const QrScanView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                    <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center border border-slate-100">
                        <h3 className="text-3xl font-black text-slate-900 tracking-tight leading-none mb-4 italic">Vincular por QR</h3>
                        <p className="text-slate-400 text-sm font-medium mb-10 leading-relaxed px-10 italic">
                            Si tienes el código QR de un cliente o contrato, súbelo como imagen o usa la cámara de tu equipo.
                        </p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            {/* Carga de Archivo (Primario) */}
                            <label className="border-2 border-dashed border-slate-200 rounded-[2rem] p-10 flex flex-col items-center justify-center cursor-pointer hover:border-[#0055DD] hover:bg-blue-50 transition-all group">
                                <input type="file" className="hidden" />
                                <Icon name="image" size={40} className="mb-4 text-slate-300 group-hover:text-[#0055DD]" />
                                <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Cargar Archivo</span>
                            </label>
                            
                            {/* Uso de Cámara (Secundario) */}
                            <div onClick={() => alert("Activando cámara...")} className="border-2 border-slate-50 bg-slate-50 rounded-[2rem] p-10 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 transition-all group">
                                <Icon name="camera" size={40} className="mb-4 text-slate-300 group-hover:text-slate-900" />
                                <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Usar Cámara PC</span>
                            </div>
                        </div>

                        <button onClick={() => setStep('dashboard')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Finalizar Vinculación</button>
                        <button onClick={() => setStep('method_select')} className="mt-8 text-slate-300 font-black text-[10px] uppercase tracking-widest">Volver a opciones</button>
                    </div>
                </div>
            );

            // --- VISTA 4: FORMULARIO INDIVIDUAL (CON SIMETRÍA Y LÓGICA CORREGIDA) ---
            const PropertyFormView = () => {
                const [formSubStep, setFormSubStep] = useState(1);
                
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                        <div className="max-w-3xl w-full bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
                            
                            {/* Header de progreso simétrico */}
                            <div className="flex h-2 w-full bg-slate-50">
                                <div className="h-full bg-[#0055DD] transition-all duration-700" style={{ width: `${(formSubStep/3)*100}%` }}></div>
                            </div>

                            <div className="p-16">
                                {formSubStep === 1 && (
                                    <div className="space-y-12 animate-in text-center">
                                        <header>
                                            <h3 className="text-3xl font-black text-slate-900 tracking-tighter italic">Ubicación de la Propiedad</h3>
                                            <p className="text-slate-400 text-sm mt-3 font-medium">La geolocalización autocompletará los detalles.</p>
                                        </header>
                                        
                                        <div className="max-w-xl mx-auto space-y-6 text-left">
                                            <div className="relative">
                                                <Icon name="map-pin" className="absolute left-5 top-5 text-[#0055DD]" size={20}/>
                                                <input type="text" placeholder="Ingresa la dirección (ej: Caseros 1230)" className="input-pill pl-14" />
                                            </div>
                                            
                                            <div className="h-60 bg-slate-100 rounded-[2rem] overflow-hidden border-4 border-white shadow-inner flex items-center justify-center">
                                                <div className="text-center opacity-20">
                                                    <Icon name="map" size={48} className="mx-auto mb-3" />
                                                    <p className="text-[10px] font-black uppercase tracking-widest">Mapa de Referencia</p>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-6">
                                                <div>
                                                    <label className="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest">Barrio</label>
                                                    <input type="text" placeholder="ej: Nueva Córdoba" className="input-pill mt-1" />
                                                </div>
                                                <div>
                                                    <label className="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest">Localidad</label>
                                                    <input type="text" placeholder="ej: Córdoba Capital" className="input-pill mt-1" />
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={() => setFormSubStep(2)} className="bg-[#0055DD] text-white px-12 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-blue-100">
                                            Siguiente: Características
                                        </button>
                                    </div>
                                )}

                                {formSubStep === 2 && (
                                    <div className="space-y-12 animate-in">
                                        <header className="text-center">
                                            <h3 className="text-3xl font-black text-slate-900 tracking-tighter italic">Características Principales</h3>
                                            <p className="text-slate-400 text-sm mt-3 font-medium">Configura los detalles del activo.</p>
                                        </header>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                            <div className="space-y-8">
                                                {/* Tipo de Propiedad */}
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 block">Tipo de Activo</label>
                                                    <div className="flex gap-2">
                                                        {['Departamento', 'Casa', 'Campo'].map(t => (
                                                            <button key={t} onClick={() => setPropertyData({...propertyData, type: t})} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter border-2 transition-all ${propertyData.type === t ? 'border-[#0055DD] bg-blue-50 text-[#0055DD]' : 'border-slate-100 text-slate-300'}`}>
                                                                {t}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* Contadores Visuales */}
                                                <div className="grid grid-cols-2 gap-6">
                                                    <div className="p-4 bg-slate-50 rounded-2xl text-center space-y-3">
                                                        <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Ambientes</span>
                                                        <div className="flex items-center justify-center gap-4">
                                                            <button onClick={() => setPropertyData({...propertyData, rooms: Math.max(1, propertyData.rooms-1)})} className="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-100 flex items-center justify-center font-black">-</button>
                                                            <span className="text-xl font-black text-[#0055DD]">{propertyData.rooms}</span>
                                                            <button onClick={() => setPropertyData({...propertyData, rooms: propertyData.rooms+1})} className="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-100 flex items-center justify-center font-black">+</button>
                                                        </div>
                                                    </div>
                                                    <div className="p-4 bg-slate-50 rounded-2xl text-center space-y-3">
                                                        <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Baños</span>
                                                        <div className="flex items-center justify-center gap-4">
                                                            <button onClick={() => setPropertyData({...propertyData, bathrooms: Math.max(1, propertyData.bathrooms-1)})} className="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-100 flex items-center justify-center font-black">-</button>
                                                            <span className="text-xl font-black text-[#0055DD]">{propertyData.bathrooms}</span>
                                                            <button onClick={() => setPropertyData({...propertyData, bathrooms: propertyData.bathrooms+1})} className="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-100 flex items-center justify-center font-black">+</button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 block">Cochera</label>
                                                    <div className="flex gap-2">
                                                        {['Si', 'No'].map(v => (
                                                            <button key={v} onClick={() => setPropertyData({...propertyData, garage: v})} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase border-2 transition-all ${propertyData.garage === v ? 'border-emerald-500 bg-emerald-50 text-emerald-600' : 'border-slate-100 text-slate-300'}`}>
                                                                {v}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="space-y-8">
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 block">Outdoor / Espacio Externo</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {['Ninguno', 'Balcón', 'Terraza', 'Patio'].map(o => (
                                                            <span key={o} onClick={() => setPropertyData({...propertyData, outdoor: o})} className={`chip-select ${propertyData.outdoor === o ? 'active' : ''}`}>{o}</span>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 block">Amenities & Extras</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {['SUM', 'Pileta', 'Gimnasio', 'Parrilla', 'Seguridad 24hs', 'Sauna'].map(a => (
                                                            <span 
                                                                key={a} 
                                                                onClick={() => {
                                                                    const news = propertyData.amenities.includes(a) ? propertyData.amenities.filter(x => x !== a) : [...propertyData.amenities, a];
                                                                    setPropertyData({...propertyData, amenities: news});
                                                                }} 
                                                                className={`chip-select ${propertyData.amenities.includes(a) ? 'active' : ''}`}
                                                            >
                                                                {a}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex justify-between items-center pt-10">
                                            <button onClick={() => setFormSubStep(1)} className="text-slate-300 font-black text-[10px] uppercase tracking-widest">Atrás</button>
                                            <button onClick={() => setFormSubStep(3)} className="bg-[#0055DD] text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-100">
                                                Siguiente: Multimedia
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {formSubStep === 3 && (
                                    <div className="space-y-12 animate-in text-center">
                                        <header>
                                            <h3 className="text-3xl font-black text-slate-900 tracking-tighter italic">Fotos y Multimedia</h3>
                                            <p className="text-slate-400 text-sm mt-3 font-medium">Sube al menos una foto de la fachada o interior.</p>
                                        </header>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl mx-auto">
                                            <label className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 hover:border-[#0055DD] hover:text-[#0055DD] transition-all cursor-pointer group">
                                                <input type="file" multiple className="hidden" />
                                                <Icon name="upload-cloud" size={48} className="mb-4 group-hover:scale-110 transition-transform" />
                                                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-center px-8 leading-relaxed">Soltar fotos aquí<br/>o buscar en disco</span>
                                            </label>
                                            <div className="grid grid-cols-2 grid-rows-2 gap-4">
                                                <div className="bg-slate-100 rounded-3xl animate-pulse"></div>
                                                <div className="bg-slate-100 rounded-3xl animate-pulse"></div>
                                                <div className="bg-slate-100 rounded-3xl animate-pulse"></div>
                                                <div className="bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200 text-3xl font-black border-2 border-white">+</div>
                                            </div>
                                        </div>

                                        <div className="pt-8 flex flex-col gap-6">
                                            <button onClick={() => setStep('dashboard')} className="w-full bg-emerald-500 text-white py-6 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-2xl shadow-emerald-100 active:scale-95 transition-all">
                                                Finalizar y Activar Activo
                                            </button>
                                            <button onClick={() => setFormSubStep(2)} className="text-slate-300 font-black text-[10px] uppercase tracking-widest">Volver a características</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- VISTAS RESTANTES (SIMULADAS) ---
            const BulkUploadView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                    <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center border border-slate-100">
                        <Icon name="file-spreadsheet" size={64} className="text-[#0055DD] mx-auto mb-8" />
                        <h3 className="text-2xl font-black text-slate-800 tracking-tight leading-none mb-4">Importación Masiva</h3>
                        <p className="text-slate-400 text-sm font-medium mb-12">Sube tu archivo .CSV o .XLSX con el formato Blindato para cargar toda tu cartera en un clic.</p>
                        <button onClick={() => setStep('dashboard')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Procesar Archivo</button>
                        <button onClick={() => setStep('method_select')} className="mt-8 text-slate-300 font-black text-[10px] uppercase tracking-widest">Volver</button>
                    </div>
                </div>
            );

            const LinkImportView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                    <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center border border-slate-100">
                        <Icon name="rocket" size={64} className="text-[#0055DD] mx-auto mb-8" />
                        <h3 className="text-2xl font-black text-slate-800 tracking-tight leading-none mb-4 italic">Importar Publicación</h3>
                        <p className="text-slate-400 text-sm font-medium mb-12 leading-relaxed px-10">Pega el link de <b>Zonaprop</b> o <b>Argenprop</b> y nosotros extraeremos todos los datos por ti.</p>
                        <input type="text" placeholder="https://www.zonaprop.com.ar/..." className="input-pill mb-8" />
                        <button onClick={() => setStep('dashboard')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Extraer Información</button>
                        <button onClick={() => setStep('method_select')} className="mt-8 text-slate-300 font-black text-[10px] uppercase tracking-widest">Volver</button>
                    </div>
                </div>
            );

            // --- VISTA 6: DASHBOARD ACTIVO ---
            const DashboardView = () => (
                <div className="flex h-screen w-full bg-slate-900 text-white animate-in items-center justify-center flex-col gap-10">
                    <div className="w-32 h-32 bg-emerald-500 rounded-[3rem] flex items-center justify-center shadow-[0_0_50px_rgba(16,185,129,0.3)] animate-pulse">
                        <Icon name="check" size={64} strokeWidth={4} />
                    </div>
                    <div className="text-center">
                        <h2 className="text-4xl font-black tracking-tighter uppercase mb-4 italic">Propiedad Activa</h2>
                        <p className="text-slate-400 font-medium max-w-sm mx-auto">Ya puedes vincular inquilinos y propietarios a esta unidad.</p>
                    </div>
                    <button onClick={() => setStep('welcome')} className="bg-white/10 text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.3em] border border-white/10">Ver Mi Cartera</button>
                </div>
            );

            return (
                <div className="min-h-screen w-full relative">
                    {step === 'welcome' && <WelcomeView />}
                    {step === 'method_select' && <MethodSelectView />}
                    {step === 'property_form' && <PropertyFormView />}
                    {step === 'bulk_upload' && <BulkUploadView />}
                    {step === 'link_import' && <LinkImportView />}
                    {step === 'qr_scan' && <QrScanView />}
                    {step === 'dashboard' && <DashboardView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreOnboarding />);
    </script>
</body>
</html>
